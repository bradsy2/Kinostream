<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoStream</title>
    <style>
        body { margin:0; font-family:Arial, sans-serif; background:#0f0f0f; color:#fff; }
        header { background:#000; padding:15px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; flex-wrap:wrap; gap:10px; }
        .logo { font-size:28px; font-weight:bold; color:#e50914; }
        .search { padding:12px; flex:1; min-width:200px; background:#222; border:none; border-radius:8px; color:white; }
        .hero { height:60vh; background-size:cover; background-position:center; display:flex; align-items:flex-end; padding:20px; position:relative; }
        .hero::after { content:""; position:absolute; bottom:0; left:0; right:0; height:50%; background:linear-gradient(transparent, #0f0f0f); }
        .section { padding:25px 15px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:15px; }
        .card { background:#1a1a1a; border-radius:12px; overflow:hidden; cursor:pointer; transition:0.2s; }
        .card:hover { transform:scale(1.05); }
        .card img { width:100%; height:230px; object-fit:cover; }
        .card-info { padding:12px; }
        .card-info h3 { margin:0 0 6px 0; font-size:15.5px; line-height:1.2; }
        .meta { font-size:13px; color:#bbb; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; overflow-y:auto; }
        .modal-content { max-width:920px; margin:15px auto; background:#111; border-radius:12px; padding-bottom:20px; }
        .close { position:absolute; top:15px; right:20px; font-size:40px; cursor:pointer; color:#fff; z-index:101; }
        button { background:#e50914; color:white; border:none; padding:14px; font-size:16px; border-radius:8px; cursor:pointer; width:100%; margin:8px 0; }
        .crypto-btn { background:#00ff9d; color:#000; font-weight:bold; }
        .card-btn { background:#4285f4; }
    </style>
</head>
<body>
    <header>
        <div class="logo">KinoStream</div>
        <input type="text" class="search" placeholder="Поиск..." id="searchInput">
    </header>

    <div id="hero" class="hero"></div>

    <div class="section"><h2>Популярное сейчас</h2><div class="grid" id="popularGrid"></div></div>
    <div class="section"><h2>Топ рейтинга</h2><div class="grid" id="topGrid"></div></div>
    <div class="section"><h2>Сериалы</h2><div class="grid" id="seriesGrid"></div></div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        const API_KEY = "78314658aab438a91e793b678fb8457a";
        const BASE_URL = "https://api.themoviedb.org/3";
        const IMG_BASE = "https://image.tmdb.org/t/p/w500";

        async function fetchTMDB(endpoint) {
            try {
                const res = await fetch(`${BASE_URL}${endpoint}?api_key=${API_KEY}&language=ru-RU`);
                if (!res.ok) throw new Error("API Error");
                return await res.json();
            } catch(e) {
                console.error(e);
                return { results: [] };
            }
        }

        async function loadContent() {
            const popular = await fetchTMDB("/movie/popular");
            renderGrid('popularGrid', popular.results);

            const top = await fetchTMDB("/movie/top_rated");
            renderGrid('topGrid', top.results);

            const series = await fetchTMDB("/tv/popular");
            renderGrid('seriesGrid', series.results, true);

            if (popular.results[0]) showHero(popular.results[0]);
        }

        function showHero(movie) {
            const hero = document.getElementById('hero');
            hero.style.backgroundImage = `url(${IMG_BASE.replace('w500', 'original')}${movie.backdrop_path})`;
            hero.innerHTML = `<div style="z-index:2;"><h1 style="font-size:32px;">${movie.title || movie.name}</h1><button onclick="showDetails(${movie.id}, false)">Подробнее</button></div>`;
        }

        function renderGrid(containerId, items, isTV = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            items.slice(0, 12).forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const title = item.title || item.name;
                const year = (item.release_date || item.first_air_date || '').substring(0,4);
                card.innerHTML = `
                    <img src="${IMG_BASE}${item.poster_path}" alt="${title}" onerror="this.src='https://picsum.photos/id/404/300/420'">
                    <div class="card-info">
                        <h3>${title}</h3>
                        <div class="meta">${year} • ⭐ ${item.vote_average ? item.vote_average.toFixed(1) : '—'}</div>
                    </div>
                `;
                card.onclick = () => showDetails(item.id, isTV);
                container.appendChild(card);
            });
        }

        async function showDetails(id, isTV) {
            const type = isTV ? 'tv' : 'movie';
            const data = await fetchTMDB(`/${type}/${id}`);
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <span class="close" onclick="closeModal()">×</span>
                <img src="${IMG_BASE.replace('w500','original')}${data.backdrop_path || data.poster_path}" style="width:100%; height:380px; object-fit:cover;">
                <div style="padding:20px;">
                    <h1>${data.title || data.name}</h1>
                    <p>⭐ ${data.vote_average ? data.vote_average.toFixed(1) : '—'}</p>
                    <p>${data.overview || 'Описание скоро...'}</p>
                    <button onclick="alert('Плеер в разработке')">▶ Смотреть</button>
                    <button onclick="showSubscribe()">💎 Оформить подписку</button>
                </div>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function showSubscribe() {
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                <span class="close" onclick="closeModal()">×</span>
                <div style="padding:25px; text-align:center;">
                    <h2>💎 KinoStream Premium</h2>
                    <h3>299 ₽ / месяц</h3>
                    <p>Неограниченный доступ • Новинки день в день • 4K</p>
                    
                    <h3 style="margin:20px 0 10px 0;">Оплата картой</h3>
                    <button class="card-btn" onclick="payCard()">Оплатить картой (СБП / Visa / Мир)</button>
                    
                    <h3 style="margin:25px 0 10px 0;">Криптовалюта</h3>
                    <button class="crypto-btn" onclick="payCrypto('TON')">TON</button>
                    <button class="crypto-btn" onclick="payCrypto('USDT')">USDT (TON)</button>
                    <button class="crypto-btn" onclick="payCrypto('BTC')">Bitcoin (BTC)</button>
                    
                    <p style="margin-top:20px; font-size:13px; color:#aaa;">После оплаты пришлите TXID в поддержку</p>
                </div>
            `;
            document.getElementById('modal').style.display = 'block';
        }

        function payCard() {
            alert("Перенаправление на оплату картой...\n\n(Демо) Подписка активирована!");
        }

        function payCrypto(crypto) {
            let address = "";
            if (crypto === "TON" || crypto === "USDT") {
                address = "UQCOL-UFj8CQaoXxk4epaM9rFekQScMLZoQ2edQFc--HVvTy";
            } else if (crypto === "BTC") {
                address = "bc1qcjm34k9tgjmxc8l54hgnmnu6yse303uzqvk60e";
            }
            
            alert(`💰 Оплата ${crypto}\n\nАдрес:\n${address}\n\nСкопируйте адрес и отправьте нужную сумму.\nПосле оплаты пришлите TXID для активации подписки.`);
        }

        // Поиск
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(window.searchTimeout);
            window.searchTimeout = setTimeout(async () => {
                const query = e.target.value.trim();
                if (query.length < 2) return loadContent();
                const res = await fetchTMDB(`/search/multi?query=${encodeURIComponent(query)}`);
                const container = document.getElementById('popularGrid');
                container.innerHTML = '<h2 style="grid-column:1/-1;">Результаты поиска</h2>';
                renderGrid('popularGrid', res.results);
            }, 500);
        });

        loadContent();
    </script>
</body>
</html>
